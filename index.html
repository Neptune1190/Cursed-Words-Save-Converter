<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursed Words Save Updater</title>

<style>
body {
  font-family: system-ui, sans-serif;
  margin: 40px;
  background: #f5f7fb;
}

.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

h1 { margin-top: 0; }

button {
  padding: 12px 18px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

input[type=file] {
  margin: 20px 0;
}

footer {
  margin-top: 30px;
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

<h1>Cursed Words Save Updater</h1>

<p>
Converts Demo Saves to work with the Full Game.
</p>

<input type="file" id="fileInput">

<br><br>

<button onclick="convertSave()">Convert Save</button>

<p id="status"></p>

<footer>
Made by Neptune6866
</footer>

</div>

<script>

function convertSave() {

  const input = document.getElementById("fileInput");
  const status = document.getElementById("status");

  if (!input.files.length) {
    status.textContent = "Select a save file first.";
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {

    let src;

    try {
      src = JSON.parse(e.target.result);
    }
    catch {
      status.textContent = "Invalid JSON save file.";
      return;
    }

    function pick(key, fallback) {
      return key in src ? src[key] : fallback;
    }

    const converted = {

Version:7,

HasEnteredSaveFile:pick("HasEnteredSaveFile",false),
IsTutorialComplete:pick("IsTutorialComplete",false),

HasSeenFirstBossDraftDialogue:pick("HasSeenFirstBossDraftDialogue",false),
HasSeenFirstPinDraftDialogue:pick("HasSeenFirstPinDraftDialogue",false),
HasSeenChallengeUnlockDialogue:pick("HasSeenChallengeUnlockDialogue",false),
HasSeenFloorFourUnlockDialogue:pick("HasSeenFloorFourUnlockDialogue",false),
HasSeenCrownsUnlockDialogue:pick("HasSeenCrownsUnlockDialogue",false),
HasSeenNumbersUnlockDialogue:pick("HasSeenNumbersUnlockDialogue",false),
HasSeenChessUnlockDialogue:pick("HasSeenChessUnlockDialogue",false),
HasSeenFractionUnlockDialogue:pick("HasSeenFractionUnlockDialogue",false),

HasSeenCurrencyFirstTimeDialogue:pick("HasSeenCurrencyFirstTimeDialogue",false),
HasSeenWobblyFirstTimeDialogue:pick("HasSeenWobblyFirstTimeDialogue",false),
HasSeenUpgradeFirstTimeDialogue:pick("HasSeenUpgradeFirstTimeDialogue",false),

HasSeenNinaIntroDialogue:pick("HasSeenNinaIntroDialogue",false),
HasSeenBonesIntroDialogue:pick("HasSeenBonesIntroDialogue",false),
HasSeenOctaclesIntroDialogue:pick("HasSeenOctaclesIntroDialogue",false),
HasSeenNatIntroDialogue:pick("HasSeenNatIntroDialogue",false),

HasSeenFairyInClubhouseDialogue:pick("HasSeenFairyInClubhouseDialogue",false),
HasSeenWeirdColourDialogue:pick("HasSeenWeirdColourDialogue",false),
HasSeenGlitchTileDialogue:pick("HasSeenGlitchTileDialogue",false),
HasSeenScatteredItemDialogue:pick("HasSeenScatteredItemDialogue",false),
HasSeenGlitchTile:pick("HasSeenGlitchTile",false),

MusicVolumePercentage:pick("MusicVolumePercentage",50),
SFXVolumePercentage:pick("SFXVolumePercentage",50),
AnimationSpeedPercentage:pick("AnimationSpeedPercentage",50),

PiggyBankMoneySaved:pick("PiggyBankMoneySaved",0),

IsSilencingMichael:pick("IsSilencingMichael",false),
IsSilencingShopkeeper:pick("IsSilencingShopkeeper",false),
IsPreventingClickingInvalidTiles:pick("IsPreventingClickingInvalidTiles",false),
IsPreventingScatteredItemInspection:pick("IsPreventingScatteredItemInspection",false),
IsDisablingGridTilt:pick("IsDisablingGridTilt",false),
IsDisablingTileFloat:pick("IsDisablingTileFloat",false),
IsReducingCharacterWobble:pick("IsReducingCharacterWobble",false),

IsInSpeedrunMode:pick("IsInSpeedrunMode",false),
IsShowingLongEnding:pick("IsShowingLongEnding",false),

Language:pick("Language","EnglishDefault"),

Achievements:pick("Achievements",[]),

CompletedChallenges:pick("CompletedChallenges",[]),
BulkUnlocksUnlocked:pick("BulkUnlocksUnlocked",[]),
UnobservedItemUnlocks:pick("UnobservedItemUnlocks",[]),

CharacterHighestCompletedAscensions:pick("CharacterHighestCompletedAscensions",{}),

CharacterWonFinalBossFight:[],

CurrentSavedRun:null,

RunsCompletedPerCharacter:pick("RunsCompletedPerCharacter",{}),

TotalWins:pick("TotalWins",0),
BestWordScore:pick("BestWordScore",0),
HasScoredInfinity:pick("HasScoredInfinity",false),
MostMoneyEarned:pick("MostMoneyEarned",0),

MostRecentPuzzleDateYMD:pick("MostRecentPuzzleDateYMD",[1,1,1])

    };

    const blob = new Blob(
      [JSON.stringify(converted,null,2)],
      {type:"application/json"}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "converted_slot_1.sav";

    a.click();

    status.textContent = "Conversion complete ✔ Save ready to load.";

  };

  reader.readAsText(input.files[0]);

}

</script>

</body>
</html>
